<!DOCTYPE html><html><head><meta charset="utf-8">
<script type="importmap">{"imports":{"three":"./three.js","three/addons/":"./addons/"}}</script>
<style>*{margin:0}body{background:#000;width:1080px;height:1920px;overflow:hidden}</style>
</head><body>
<script type="module">
import * as THREE from 'three';
import { FontLoader } from './addons_FontLoader.js';
import { TextGeometry } from './addons_TextGeometry.js';
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(1080, 1920); document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
scene.fog = new THREE.Fog(0x0d0d0d, 10, 40);
const cam = new THREE.PerspectiveCamera(42, 1080/1920, 0.1, 100);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const key = new THREE.DirectionalLight(0xffffff, 2.6); key.position.set(3, 4, 5); scene.add(key);
const lime = new THREE.PointLight(0x9CF806, 60, 30); lime.position.set(-4, 2, 3); scene.add(lime);
const oran = new THREE.PointLight(0xe8842a, 60, 30); oran.position.set(4, -2, 3); scene.add(oran);

// floor reflection hint: dark glossy plane
const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.28, metalness: 0.85 }));
floor.rotation.x = -Math.PI / 2; floor.position.y = -1.55;
scene.add(floor);

// sparks
let s = 17; const rr = () => (s = (s * 16807 + 19) % 2147483647) / 2147483647;
const sparks = [];
for (let i = 0; i < 60; i++) {
  const d = new THREE.Mesh(new THREE.SphereGeometry(0.03 + rr() * 0.05, 6, 6),
    new THREE.MeshBasicMaterial({ color: i % 3 ? 0x9CF806 : 0xe8842a }));
  d.position.set((rr() - 0.5) * 14, (rr() - 0.5) * 10, -2 - rr() * 12);
  d.userData = { sp: 0.15 + rr() * 0.5, ph: rr() * 6.28 };
  scene.add(d); sparks.push(d);
}

window.ready = false;
new FontLoader().load('./helvetiker_bold.json', (font) => {
  const geo = new TextGeometry('V.CODE', {
    font, size: 0.92, depth: 0.36,
    curveSegments: 10, bevelEnabled: true, bevelThickness: 0.045, bevelSize: 0.03, bevelSegments: 4,
  });
  geo.center();
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xf3f3f3, metalness: 0.92, roughness: 0.22,
    clearcoat: 0.7, clearcoatRoughness: 0.2,
  });
  const mesh = new THREE.Mesh(geo, mat);
  const pivot = new THREE.Group(); pivot.add(mesh); scene.add(pivot);
  window.pivot = pivot; window.ready = true;
});

window.renderText = (t) => {
  const eob = (x) => { const c1 = 1.2, c3 = c1 + 1; return Math.max(0, 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2)); };
  const inn = eob(Math.min(1, t / 0.3));
  if (window.pivot) {
    window.pivot.rotation.y = -1.5 + inn * 1.5 + t * 0.35;
    window.pivot.rotation.x = 0.1 * Math.sin(t * 4);
    window.pivot.scale.setScalar(0.2 + 0.8 * inn);
    window.pivot.position.y = 0.15;
  }
  lime.position.x = -4 + Math.sin(t * 5) * 2.5;
  oran.position.x = 4 - Math.sin(t * 5) * 2.5;
  for (const d of sparks) {
    d.position.y += Math.sin(t * 20 + d.userData.ph) * 0.004;
    d.position.x += d.userData.sp * 0.01;
  }
  const dist = 6.8 - t * 0.9;
  cam.position.set(Math.sin(t * 0.5) * 0.8, 0.35, dist);
  cam.lookAt(0, 0.1, 0);
  renderer.render(scene, cam);
};
</script></body></html>
