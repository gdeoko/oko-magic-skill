<!-- ПЕРЕД РЕНДЕРОМ: cp node_modules/maplibre-gl/dist/maplibre-gl.{js,css} рядом с этим файлом; тайлы OSM качать локально в ./tiles/{z}/{x}/{y}.png -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="./maplibre-gl.css">
<script src="./maplibre-gl.js"></script>
<style>
@font-face{font-family:'SG';src:url('assets/soyuz.ttf')}
*{margin:0} body{width:1080px;height:1920px;overflow:hidden;background:#10131a;position:relative}
#map{width:1080px;height:1920px;position:absolute;filter:saturate(.4) brightness(.78) contrast(1.14)}
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 38%, rgba(6,7,10,.78) 100%);pointer-events:none}
#lbl{position:absolute;top:700px;left:0;right:0;text-align:center;opacity:0}
#lbl span{font-family:'SG';font-size:92px;color:#fff;letter-spacing:4px;background:rgba(10,10,10,.78);
  padding:18px 44px;border-radius:20px;border-left:10px solid #9CF806;box-shadow:0 18px 60px rgba(0,0,0,.6)}
#ring{position:absolute;top:960px;left:540px;width:40px;height:40px;margin:-20px 0 0 -20px;border:5px solid #9CF806;
  border-radius:50%;opacity:0;pointer-events:none;box-shadow:0 0 18px rgba(156,248,6,.6)}
</style></head><body>
<div id="map"></div><div id="vig"></div>
<div id="ring"></div>
<div id="lbl"><span id="lblTx">ВОРОНЕЖ</span></div>
<script>
const VOR = [39.2, 51.66];
const map = new maplibregl.Map({
  container: 'map',
  style: {version: 8, sources: {osm: {type: 'raster', tiles: ['http://localhost:8779/tiles/{z}/{x}/{y}.png'], tileSize: 256, maxzoom: 6}},
    layers: [{id: 'bg', type: 'background', paint: {'background-color': '#a8c8e0'}}, {id: 'osm', type: 'raster', source: 'osm'}]},
  center: [41.5, 55.0], zoom: 3.0, interactive: false, attributionControl: false, fadeDuration: 0,
  canvasContextAttributes: {preserveDrawingBuffer: true},
});
window.ready = false;
map.on('load', () => {
  map.addSource('city', {type: 'geojson', data: {type: 'Feature', geometry: {type: 'Point', coordinates: VOR}, properties: {}}});
  map.addLayer({id: 'city-dot', type: 'circle', source: 'city',
    paint: {'circle-color': '#9CF806', 'circle-radius': 15, 'circle-stroke-color': '#0d0d0d', 'circle-stroke-width': 6}});
  map.once('idle', () => { window.ready = true; });
});
const ease = (x) => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3)/2;
window.setMapFrame = (t) => new Promise((res) => {
  const p = Math.min(1, Math.max(0, (t - 0.05) / 0.75));
  const e = ease(p);
  const zoom = 3.0 + e * 2.8;
  const lng = 44.0 + (VOR[0] - 44.0) * e;
  const lat = 56.5 + (VOR[1] - 56.5) * e;
  map.jumpTo({center: [lng, lat], zoom});
  const lblP = Math.min(1, Math.max(0, (t - 0.62) / 0.12));
  const lbl = document.getElementById('lbl');
  lbl.style.opacity = lblP;
  lbl.style.transform = `translateY(${(1-lblP)*60}px)`;
  const ring = document.getElementById('ring');
  if (t > 0.72) {
    const rp = ((t - 0.72) * 3.2) % 1;
    ring.style.opacity = (1 - rp) * 0.9;
    ring.style.transform = `scale(${1 + rp * 5})`;
  } else ring.style.opacity = 0;
  let done = false;
  const finish = () => { if (!done) { done = true; res('ok'); } };
  map.once('idle', finish);
  setTimeout(finish, 900);
  map.triggerRepaint();
});
</script></body></html>
