<!DOCTYPE html><html><head><meta charset="utf-8">
<style>*{margin:0}html,body{width:1080px;height:1920px;background:transparent;overflow:hidden}canvas{display:block}</style>
</head><body>
<script type="module">
import * as THREE from './three.module.min.js';
const P=new URLSearchParams(location.search);
const shape=P.get('shape')||'coin', col=parseInt(P.get('col')||'9CF806',16), col2=parseInt(P.get('col2')||'e8842a',16);
const R=new THREE.WebGLRenderer({antialias:true,alpha:true});
R.setSize(1080,1920);R.setClearColor(0x000000,0);R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.15;document.body.appendChild(R.domElement);
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(40,1080/1920,0.1,100);cam.position.set(0,0,7);
const ec=document.createElement('canvas');ec.width=64;ec.height=256;const ex=ec.getContext('2d');
const eg=ex.createLinearGradient(0,0,0,256);eg.addColorStop(0,'#3a3a44');eg.addColorStop(0.45,'#12131a');eg.addColorStop(0.5,'#20242e');eg.addColorStop(0.55,'#0c0d12');eg.addColorStop(1,'#2a2a30');
ex.fillStyle=eg;ex.fillRect(0,0,64,256);
ex.fillStyle='rgba(154,255,0,.5)';ex.fillRect(0,40,64,26);ex.fillStyle='rgba(232,132,42,.5)';ex.fillRect(0,180,64,22);
const envT=new THREE.CanvasTexture(ec);envT.mapping=THREE.EquirectangularReflectionMapping;scene.environment=envT;
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const k=new THREE.DirectionalLight(0xffffff,3.0);k.position.set(3,5,6);scene.add(k);
const l1=new THREE.PointLight(col,90,40);l1.position.set(-4,3,4);scene.add(l1);
const l2=new THREE.PointLight(col2,90,40);l2.position.set(4,-3,4);scene.add(l2);
let geo;
if(shape==='coin'){geo=new THREE.CylinderGeometry(2,2,0.42,64);}
else if(shape==='torus'){geo=new THREE.TorusGeometry(1.7,0.55,32,80);}
else if(shape==='diamond'){geo=new THREE.OctahedronGeometry(2.1,0);}
else if(shape==='droplet'){geo=new THREE.SphereGeometry(1.9,48,48);}
else if(shape==='ring'){geo=new THREE.TorusGeometry(1.9,0.28,24,90);}
else {geo=new THREE.IcosahedronGeometry(2.0,0);}
const tint=P.get('mat')||'gem';
let mat;
if(tint==='metal'){mat=new THREE.MeshPhysicalMaterial({color:0xf2f2f0,metalness:0.95,roughness:0.14,clearcoat:1.0,clearcoatRoughness:0.1});}
else{ // vivid branded gem
 mat=new THREE.MeshPhysicalMaterial({color:new THREE.Color(col),metalness:0.15,roughness:0.08,clearcoat:1.0,clearcoatRoughness:0.06,
   emissive:new THREE.Color(col),emissiveIntensity:0.28,reflectivity:0.9,transmission:0.0});}
if(shape==='droplet'){mat.color.setHex(0x8fd0ff);mat.metalness=0.1;mat.roughness=0.03;mat.emissive=new THREE.Color(0x2a99e0);mat.emissiveIntensity=0.18;}
const mesh=new THREE.Mesh(geo,mat);const pivot=new THREE.Group();pivot.add(mesh);scene.add(pivot);
window.render3d=(t)=>{const eob=x=>{const c1=1.4,c3=c1+1;return Math.max(0,1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2));};
 const inn=eob(Math.min(1,t/0.35));pivot.scale.setScalar(0.12+0.88*inn);
 pivot.rotation.y=t*1.5;pivot.rotation.x=(shape==='coin'?1.15:0.0)+0.12*Math.sin(t*1.6);
 mesh.position.y=Math.sin(t*2)*0.1;R.render(scene,cam);};
window.ready=true;
</script></body></html>
