<!DOCTYPE html><html><head><meta charset="utf-8">
<script type="importmap">{"imports":{"three":"./three.js","three/addons/":"./addons/"}}</script>
<style>*{margin:0}body{background:#000;width:1080px;height:1920px;overflow:hidden}</style>
</head><body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './GLTFLoader.js';
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(1080, 1920); document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(44, 1080/1920, 0.1, 200);

// background: stock frame on a large plane far behind (slight parallax vs camera)
const bgTex = new THREE.TextureLoader().load('assets/demo_bg.jpg', () => {});
bgTex.colorSpace = THREE.SRGBColorSpace;
const bg = new THREE.Mesh(new THREE.PlaneGeometry(23, 41), new THREE.MeshBasicMaterial({ map: bgTex }));
bg.position.set(0, 0, -16);
scene.add(bg);

// soft contact shadow under the object
const shCv = document.createElement('canvas'); shCv.width = shCv.height = 256;
const sx = shCv.getContext('2d');
const sg = sx.createRadialGradient(128, 128, 8, 128, 128, 120);
sg.addColorStop(0, 'rgba(0,0,0,0.55)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
sx.fillStyle = sg; sx.fillRect(0, 0, 256, 256);
const shadow = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 1.6),
  new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(shCv), transparent: true, depthWrite: false }));
shadow.rotation.x = -Math.PI / 2;
shadow.position.set(0.55, -2.5, 0);
scene.add(shadow);

scene.add(new THREE.AmbientLight(0xfff2e6, 1.5));
const key = new THREE.DirectionalLight(0xffe8d0, 2.6); key.position.set(2.5, 3.5, 2.5); scene.add(key);
const rim = new THREE.DirectionalLight(0x9CF806, 1.3); rim.position.set(-3, 1.5, -2); scene.add(rim);
const warm = new THREE.PointLight(0xe8842a, 8, 12); warm.position.set(1.6, 0.6, 1.4); scene.add(warm);

const tex = new THREE.TextureLoader().load('assets/models/rose/textures/petal_diffuse.png');
tex.colorSpace = THREE.SRGBColorSpace; tex.flipY = false;
const loader = new GLTFLoader();
window.ready = false;
loader.load('assets/models/rose/scene.gltf', (g) => {
  const obj = g.scene;
  obj.traverse((c) => {
    if (!c.isMesh) return;
    const name = (c.material && c.material.name || '').toLowerCase();
    c.material = name.includes('petal')
      ? new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5, metalness: 0, side: THREE.DoubleSide })
      : new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.65, side: THREE.DoubleSide });
  });
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  const sc = 5.2 / size;
  obj.scale.setScalar(sc);
  obj.position.copy(center).multiplyScalar(-sc);
  const pivot = new THREE.Group(); pivot.add(obj);
  pivot.position.y = -1.15; pivot.position.x = 0.55;
  scene.add(pivot);
  window.pivot = pivot; window.ready = true;
}, undefined, (e) => console.log('gltf ERR', e.message || e));

window.renderObj = (t) => {
  const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
  // camera orbit: slight arc, dolly-in
  const ang = -0.35 + e * 0.7;
  const dist = 4.6 - e * 0.7;
  cam.position.set(Math.sin(ang) * dist, 0.35 + Math.sin(t * 3.1) * 0.06, Math.cos(ang) * dist);
  cam.lookAt(0.45, 0.35, 0);
  // background parallax: moves slower than camera -> feels embedded
  bg.position.x = -Math.sin(ang) * 2.4;
  // rose spins to face + gentle sway
  if (window.pivot) {
    window.pivot.rotation.y = -0.6 + e * 1.9;
    window.pivot.rotation.z = Math.sin(t * 6.28) * 0.04;
    const pop = t < 0.18 ? (t / 0.18) : 1;
    const op = 1 - Math.pow(1 - pop, 3);
    window.pivot.scale.setScalar(op);
    shadow.material.opacity = op;
    shadow.scale.setScalar(0.5 + 0.5 * op);
  }
  renderer.render(scene, cam);
};
</script></body></html>
